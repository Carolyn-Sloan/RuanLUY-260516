name: Build OpenWrt

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: "SSH connection to Actions"
        required: false
        default: "false"

  repository_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-25.12

  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh

  TZ: Asia/Shanghai

  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true

concurrency:
  group: openwrt-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 1024
        temp-reserve-mb: 100
        swap-size-mb: 4096
        remove-dotnet: true
        remove-android: true
        remove-haskell: true
        remove-codeql: true

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |

        echo "=================="
        echo "Disk space before cleanup"
        echo "=================="

        df -hT

        sudo rm -rf \
          /usr/share/dotnet \
          /usr/local/lib/android \
          /opt/ghc \
          /opt/hostedtoolcache/CodeQL \
          /opt/hostedtoolcache/go \
          /opt/hostedtoolcache/Python \
          /opt/hostedtoolcache/node \
          /opt/hostedtoolcache/Ruby

        docker system prune -a -f || true

        sudo apt-get clean
        sudo apt-get autoremove --purge -y

        echo "=================="
        echo "Disk space after cleanup"
        echo "=================="

        df -hT

        sudo apt-get update

        sudo apt-get install -y \
          ack \
          antlr3 \
          asciidoc \
          autoconf \
          automake \
          autopoint \
          binutils \
          bison \
          build-essential \
          bzip2 \
          ccache \
          cmake \
          cpio \
          curl \
          device-tree-compiler \
          flex \
          gawk \
          gettext \
          gcc-multilib \
          g++-multilib \
          git \
          gperf \
          haveged \
          help2man \
          intltool \
          libc6-dev-i386 \
          libelf-dev \
          libglib2.0-dev \
          libgmp-dev \
          libltdl-dev \
          libmpc-dev \
          libmpfr-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libpython3-dev \
          libreadline-dev \
          libssl-dev \
          libtool \
          lrzsz \
          mkisofs \
          msmtp \
          nano \
          ninja-build \
          p7zip-full \
          patch \
          pkgconf \
          python3 \
          python3-pip \
          python3-ply \
          python3-docutils \
          python3-setuptools \
          qemu-utils \
          rsync \
          scons \
          squashfs-tools \
          subversion \
          swig \
          texinfo \
          uglifyjs \
          unzip \
          vim \
          wget \
          xmlto \
          xxd \
          zlib1g-dev

        sudo timedatectl set-timezone "$TZ"

        echo "=================="
        echo "Disk space after install"
        echo "=================="

        df -hT

    - name: Clone source code
      run: |
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
        cd openwrt

    - name: Cache dl
      uses: actions/cache@v4
      with:
        path: openwrt/dl
        key: openwrt-dl-${{ hashFiles('diy-part1.sh') }}
        restore-keys: |
          openwrt-dl-
          
    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: openwrt-ccache-${{ runner.os }}
        restore-keys: |
          openwrt-ccache-

    - name: Load custom feeds
      run: |
        set -x
        echo "workspace:"
        ls -la $GITHUB_WORKSPACE
        SCRIPT="$GITHUB_WORKSPACE/diy-part1.sh"
        if [ ! -f "$SCRIPT" ]; then
          echo "ERROR: diy-part1.sh not found"
          find $GITHUB_WORKSPACE -name "diy-part1.sh"
            exit 1
        fi
          chmod +x "$SCRIPT"
          cd openwrt
          "$SCRIPT"

    - name: Update feeds
      run: |

        cd openwrt

        ./scripts/feeds update -a

    - name: Install feeds
      run: |

        cd openwrt

        ./scripts/feeds install -a

    - name: Load custom configuration
      run: |

        [ -d files ] && cp -r files openwrt/files

        [ -f $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config

        chmod +x $DIY_P2_SH

        cd openwrt

        $GITHUB_WORKSPACE/$DIY_P2_SH

        make defconfig

    - name: SSH connection to Actions
      uses: mxschmitt/action-tmate@v3
      if: github.event.inputs.ssh == 'true'

    - name: Download package
      run: |

        cd openwrt

        make download -j2

        find dl -size -1024c -exec ls -l {} \;

        find dl -size -1024c -exec rm -f {} \;

    - name: Compile firmware
      id: compile
      run: |

        cd openwrt

        echo "=================="
        echo "Start compiling"
        echo "=================="

        make -j2 || make -j1 V=s

        echo "status=success" >> $GITHUB_OUTPUT

        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | \
        sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME

        [ -s DEVICE_NAME ] && \
        echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV

        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Organize firmware
      id: organize
      if: steps.compile.outputs.status == 'success'
      run: |

        cd openwrt/bin/targets/*/*

        rm -rf packages

        sha256sum * > sha256sums.txt

        echo "FIRMWARE=$PWD" >> $GITHUB_ENV

        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success'
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true'
      run: |

        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT

        touch release.txt

        echo "OpenWrt firmware build completed." >> release.txt

        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to Release
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: Delete workflow runs
      uses: GitRML/delete-workflow-runs@main
      with:
        retain_days: 7
        keep_minimum_runs: 5

    - name: Remove old Releases
      uses: dev-drprasad/delete-older-releases@v0.2.1
      if: env.UPLOAD_RELEASE == 'true'
      with:
        keep_latest: 5
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
